# Ejemplo para VPS: MongoDB + API. El front suele ir aparte (p. ej. Vercel).
# Uso: cp backend/.env.example backend/.env && editar → docker compose -f docker-compose.prod.yml up -d
#
# DATABASE_URL en .env debe apuntar a mongodb://mongo:27017/...

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - puro_flusso_mongo:/data/db
    ports:
      - "127.0.0.1:27017:27017"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

volumes:
  puro_flusso_mongo:
