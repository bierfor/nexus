# Nexus.js Full Stack - Production Docker Compose
# Includes: Nexus app, PostgreSQL, Redis (for rate limiting / caching)

version: '3.9'

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Nexus Application Server
  # ──────────────────────────────────────────────────────────────────────────
  nexus-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-app
    restart: unless-stopped
    ports:
      - "${NEXUS_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXUS_PORT: 3000
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD:-changeme}@postgres:5432/nexus_production
      REDIS_URL: redis://redis:6379
      NEXUS_SECRET: ${NEXUS_SECRET}
      NEXUS_BUILD_ID: ${GITHUB_SHA:-local}
      # Stripe (for PayLinks)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-network
    volumes:
      # Mount app source (for hot-reload in dev mode)
      # Remove this in production and rely on baked image
      - ./src:/app/src:ro
      - ./public:/app/public:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/_nexus/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_production
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: custom init scripts
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Redis (for rate limiting, sessions, caching)
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy (optional, for SSL termination)
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nexus-app
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
